      const result = true ? 'truthy' : 'falsy'; // ternary operator - similar to an if else statement (shortcut for if statement). First value is the condition, if it is truthy the result of the code is the value after the ?. If it is falsy, the result of the code is the value after the :. An advantage to this is that a ternary operator can be saved in a variable. 
      console.log(result);

      false && console.log('hello'); // becuase the left side is not truthy, the and operator stops early (short circuits) and doesnt run the code on the right, this can be used to block the code on the right (this is called the guard operator) - similar to an if statement, in this case the condition is false so the console.log doesn't run. 

      const message = 5 && 'hello'; // guard operator can be stored in vairiable, when the first operator is falsy, the first value is the result (stored in the variable). When the first value is truthy, it is only the second value that is stored in the variable. This is like an if statement where if the condition is true then a certain value is assigned to a variable inside the {} of the if statement
      console.log(message);

      const currency = undefined || 'USD'; // this is the default operator, if the value on the left is true, it stops (short circuits) there and that is the result (the value that is stored in the variable, so it is like the opposeit of the guard operator in a way). The OR operator can be used to set a default value - so in this case it is called the default operator. It is a shortcut for an if statement which has the condition !condition (if this condition is not true, which is the condition before the ||), then (between the {}) - the value is the second value, in this case USD
