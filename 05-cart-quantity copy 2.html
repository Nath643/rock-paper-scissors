<!DOCTYPE html>
<html>
  <head>
    <title>Cart Quantity - Copy 2</title>
    <style>

    </style>
  </head>
  <body>
    <button onclick="
      console.log(`Cart Quantity: ${cartQuantity}`);
    ">Show Quantity</button>

    <button onclick="
      // cartQuantity = cartQuantity + 1;
      updateCartQuantity('+', 1)
    ">Add to Cart</button>

    <button onclick="
      // cartQuantity = cartQuantity + 2;
      updateCartQuantity('+', 2)
    ">+ 2</button>

    <button onclick="
      updateCartQuantity('+', 3)
    ">+ 3</button>

    <button onclick="
      updateCartQuantity('+', 4)
    ">+ 4</button>

    <button onclick="
      updateCartQuantity('+', 5)
    ">+ 5</button>

    <button onclick="
      updateCartQuantity('-', 1)
    ">Remove From Cart</button>

    <button onclick="
      updateCartQuantity('-', 2)
    ">- 2</button>

    <button onclick="
      updateCartQuantity('-', 3)
    ">- 3</button>

    <button onclick="
      cartQuantity = 0;
      console.log(`Cart was reset.`);
      console.log(`Cart Quantity: ${cartQuantity}`);
    ">Reset Cart</button>

    <script> 
      let cartQuantity = 0;

      function updateCartQuantity(plusOrMinus, amount) {
        if (plusOrMinus === '-') {   
          cartQuantity -= amount;  
          if (cartQuantity < 0) {
            cartQuantity = 0;
            alert('not enough items in cart');
            console.log(`Cart Quantity: ${cartQuantity}`);
            return;
          }
          console.log(`Cart Quantity: ${cartQuantity}`);
        } else if (plusOrMinus === '+') {
          cartQuantity += amount;
          if (cartQuantity > 10) {
            cartQuantity = 10;
            alert('the cart is full');
            console.log(`Cart Quantity: ${cartQuantity}`);
            return;
          }
          console.log(`Cart Quantity: ${cartQuantity}`);
        }
      }        
      
      const product = {
        name: 'basketball',
        price: 2095
      };
      console.log(product);
      product.price += 500;
      console.log(product);
      
      console.log(product['delivery-time'] = '3 days');

      const productOne = {
        name: 'basketball',
        price: 2015
      };
      const productTwo = {
        name: 'basketball',
        price: 2035
      };
      function comparePrice(product1, product2) {
        if (product1.price < product2.price) {
          return product1;
        } else if (product2.price < product1.price) {
          return product2;
        }
      }
      console.log(comparePrice(productOne, productTwo));

      function isSameProduct(product1, product2) {
        if (product1.name === product2.name && product1.price === product2.price) {
          return true;
        } else {
          return false;
        }
      }
      console.log(isSameProduct(productOne, productTwo));

      
    </script>
  </body>
</html>
