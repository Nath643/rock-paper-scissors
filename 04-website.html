<!DOCTYPE html>
<html>
  <head>
    <title>HTML CSS Review</title>
    <style>
      .red-button {
        background-color: red;
        color: white;
        border: none;
      }

      .yellow-button {
        background-color: yellow;
      }
    </style>
  </head>
  <body>
    <button title="good job" class="red-button" 
    onclick="
        alert('good job');
    ">
      Hello
    </button>

    <p>
      Paragraph of <button class="yellow-button">good</button> text
    </p>
<!--The javascript in the script element runs before the javascript in the html attributes-->
    <script> 
      // alert('hello world');
      /* 
        Multi line 
        comment
      */

      console.log(2+2);
      console.log('some' + ' text');
    </script>
  </body>
</html>
