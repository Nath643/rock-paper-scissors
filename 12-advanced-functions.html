      function addNum(array, num) {

      function removeEgg(foods) {
        let eggCounter = 0;
        return foods.filter((value, index) => {
          if (value !== 'egg') {
            return true;
          } else if (value === 'egg' && eggCounter < 2) {
            eggCounter++;
            return true;
          }
