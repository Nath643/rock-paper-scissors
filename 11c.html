      const strings = [
        'hello',
        'world',
        'good',
        'good',
        'hello'
      ];

      function countWords(words) {
        let stringCount = {};

        for (let i = 0; i < words.length; i++) {
          stringCount[words[i]] = 0;
        }

        for (let i = 0; i < words.length; i++) {
          stringCount[words[i]]++;
        }
        return stringCount;
      }

      console.log(countWords(strings));
