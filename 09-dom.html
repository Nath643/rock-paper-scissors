<!DOCTYPE html>
<html>
  <head>
    <title>DOM</title>
  </head>
  <body>
    <!-- In the context of the DOM, html elements are js objects (with methods etc.) -->


    <!-- <button>hello</button> -->
    <!-- <button class="js-button">Second button</button> -->

    <button class="js-heads-button" onclick="
      displayHeads();
    ">Heads</button>
    <button class="js-tails-button" onclick="
      displayTails();
    ">Tails</button>
    <p class="js-result-area"></p>

    <script> 
      function displayHeads() {
        const headsResult = document.querySelector('.js-heads-button').innerHTML;
        document.querySelector('.js-result-area').innerHTML = `You chose: ${headsResult}`;
      }

      function displayTails() {
        const tailsResult = document.querySelector('.js-tails-button').innerHTML;
        document.querySelector('.js-result-area').innerHTML = `You chose: ${tailsResult}`;
      }
