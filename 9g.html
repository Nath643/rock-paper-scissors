<!DOCTYPE html>
<html>
  <head>
    <title>DOM 9g</title>
  </head>
  <body>
    <p>Youtube Subscribe Button</p>
    <button onclick="
      subscribe();
    " class="js-subscribe-button">
      Subscribe
    </button>

    <p>Amazon Shipping Calculator</p>
    <input placeholder="Cost of order" class="js-cost-input" onkeydown="handleCostKeyDown(event)">
    <button onclick="
      calculateTotal();
    ">Calculate</button>
    <p class="js-total-cost"></p>

    <input class="js-text-input" placeholder="Type something" onkeyup="
      changeText();
    ">
    <p class="js-text-area"></p>

    <script> 
      function changeText() {
        const userInput = document.querySelector('.js-text-input').value;
        document.querySelector('.js-text-area').innerHTML = userInput;
      }

      String(25);
      console.log('25' - 5); // is a string only contains a number and we do a maths function on it like - * /, it will be converted to a number. 
      console.log('25' + 5); // It doesn't work for adding.

      window.document
      window.console.log('window');
      window.alert

      function handleCostKeyDown(event) {
        if (event.key === 'Enter') {
          calculateTotal();
        }
      }

      function calculateTotal() {
        const inputElement = document.querySelector('.js-cost-input'); // when we get a value from the dom it will be a string
        let cost = Number(inputElement.value); // this is how to get the text inside an input element because it doesn't have a closing tag with text between the opening and closing tags. The number function converts things to number.

        if (cost < 30) {
          cost *= 100;
          cost += 1000;
          cost /= 100;
        }

        document.querySelector('.js-total-cost').innerHTML = `$${cost}`;
      }

      function subscribe() {
        const buttonElement = document.querySelector('.js-subscribe-button');

        if (buttonElement.innerText === 'Subscribe') { // inner text gets the text inside an element without the spaces, innerhtml gets the spaces
          buttonElement.innerText = 'Subscribed';
        } else if (buttonElement.innerText === 'Subscribed') {
          buttonElement.innerText = 'Subscribe'
        }
      }
    </script>
  </body>
</html>
