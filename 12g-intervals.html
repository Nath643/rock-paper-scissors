<!DOCTYPE html>
<html>
  <head>
    <title>App</title>
  </head>
  <body>
    <button onclick="messages++">Add</button>
    <button onclick="messages--">Remove</button>

    <script> 
      let messages = 2;

      setInterval(function() {
        if (document.title !== 'App' || messages === 0) {
          document.title = 'App';
        } else {
          document.title = `(${messages}) New Messages`;
        }
      }, 1000);


      //clearInterval(intervalId);
    </script>
  </body>
</html>
