    <p>Rock Paper Scissors</p>

    <button onclick="
      const randomNumber = Math.random(); //generates a random number >= 0 and < 1
      let computerMove = ''; // any variable created inside {} brackets only exists in those brackets
      let result = '';
      if (randomNumber >= 0 && randomNumber < 1 / 3) { // logical operators let us combine boolean values
        computerMove = 'rock';
      } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
        computerMove = 'paper';
      } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
        computerMove = 'scissors';
      }

      if (computerMove === 'rock') {
        result = 'Tie';
      } else if (computerMove === 'paper') {
        result = 'You lose';
      } else if (computerMove === 'scissors') {
        result = 'You win';
      }

      alert(`You picked rock, computer picked ${computerMove}. ${result}`);
    ">Rock</button>
