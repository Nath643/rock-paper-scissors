      /*
      // this is the accumulator pattern:
      const nums = [1, 1, 3];
      let total = 0; // this is the accumulator variable

      // Like objects, arrays are also references
      const array1 = [1, 2, 3]; // This variable does not contain the values 1, 2, 3. The array is saved in memory and this variable only contains a reference pointing to where the array is in memory

      const array2 = array1.slice(); // both of these variables point to the same array without slice(). To avoid the different variables pointing to the same array in memory, we can create a copy of the values in the array, using slice()


      array2.push(4);
      console.log(array1);
      console.log(array2);

      //Destructuring shortcut
      const [firstValue, secondValue, thirdValue] = [1, 2, 3]; // The values in the array are saved in the variables

      for (let i = 1; i <= 10; i++) {
        if (i % 3 === 0) {
          continue; // This skips the rest of code in the loop when i is 3. 'Continue' skips one iteration of the loop.; If you print out the number on each iteration in the console (as done below), the 3 would be missing. 
        }

        console.log(i);
        if (i === 8) {
          break; // Ends the loop
        }
      }

      let i = 1;

      while (i <= 10) {
        if (i % 3 === 0) {
          i++; // The increment step has to be here as continue will skip the increment step in a while loop, which would create an infinite loop
          continue;
        }
        console.log(i);
        i++
      }

      function doubleArray(nums) {
        const numsDoubled = [];

        for (let i = 0; i < nums.length; i++) {
          const num = nums[i];
          if (num === 0) {
            return numsDoubled; // Inside a loop inside a function, return can be used to break out of the loop
          }
          numsDoubled.push(num * 2);
        }
        return numsDoubled;
      }

      console.log(doubleArray([1, 1, 3]));
      console.log(doubleArray([2, 2, 5, 0, 5]));
